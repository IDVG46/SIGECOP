<div class="widget-header friendly-header">
    <h4 class="widget-title">{{ title }}</h4>
    {% if add_button_id %}
    <div class="widget-toolbar">
        <button type="button" class="btn btn-xs btn-success" id="{{ add_button_id }}">
            <i class="fa fa-plus"></i> {{ add_button_label|default:"Agregar" }}
        </button>
    </div>
    {% endif %}
</div>
